<h2>Homepage Layout</h2>
<p class="subtitle">How the main page should be organized</p>

<div class="mockup">
  <div class="mockup-header">Schrammel Reloaded — Homepage</div>
  <div class="mockup-body">
    <div style="background:#0a0a1a;padding:16px;">
      <!-- Hero / Player -->
      <div style="background:linear-gradient(135deg,rgba(255,0,110,0.1),rgba(131,56,236,0.1),rgba(58,134,255,0.1));padding:24px;border-radius:16px;border:1px solid rgba(255,255,255,0.08);margin-bottom:16px;">
        <div style="display:flex;align-items:center;gap:20px;">
          <div style="width:120px;height:120px;background:linear-gradient(135deg,#ff006e,#8338ec,#3a86ff);border-radius:16px;display:flex;align-items:center;justify-content:center;color:white;font-size:40px;font-weight:bold;box-shadow:0 0 30px rgba(255,0,110,0.3);">▶</div>
          <div style="flex:1;">
            <div style="color:#fff;font-size:24px;font-weight:bold;text-shadow:0 0 10px rgba(255,0,110,0.3);">Der Schrammel<span style="color:#ff006e">.</span>Reloaded<span style="color:#3a86ff">.</span>Stream</div>
            <div style="color:#888;font-size:14px;margin-top:8px;">Now Playing: <span style="color:#fff;">Artist — Title</span></div>
            <div style="display:flex;gap:12px;margin-top:16px;align-items:center;">
              <div style="background:rgba(255,0,110,0.15);padding:10px 20px;border-radius:24px;color:#ff006e;font-size:18px;border:1px solid #ff006e40;cursor:pointer;">👎</div>
              <div style="background:rgba(58,134,255,0.15);padding:10px 20px;border-radius:24px;color:#3a86ff;font-size:18px;border:1px solid #3a86ff40;cursor:pointer;">👍</div>
              <div style="flex:1;background:rgba(255,255,255,0.05);height:6px;border-radius:3px;"><div style="background:linear-gradient(90deg,#ff006e,#3a86ff);height:100%;width:60%;border-radius:3px;"></div></div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Two columns -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <!-- Top 10 -->
        <div style="background:rgba(255,255,255,0.03);padding:20px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);">
          <div style="color:#ff006e;font-size:14px;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;font-weight:bold;">🏆 Top 10</div>
          <div style="color:#fff;font-size:13px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);">1. Song — Artist <span style="color:#3a86ff;float:right;">+42</span></div>
          <div style="color:#fff;font-size:13px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);">2. Song — Artist <span style="color:#3a86ff;float:right;">+38</span></div>
          <div style="color:#fff;font-size:13px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);">3. Song — Artist <span style="color:#3a86ff;float:right;">+31</span></div>
          <div style="color:#666;font-size:12px;padding:8px 0;">... and 7 more</div>
        </div>
        
        <!-- Wishlist -->
        <div style="background:rgba(255,255,255,0.03);padding:20px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);">
          <div style="color:#3a86ff;font-size:14px;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;font-weight:bold;">🎵 Wunschliste</div>
          <div style="display:flex;gap:8px;margin-bottom:12px;">
            <input style="flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 12px;color:#fff;font-size:13px;" placeholder="Artist">
            <input style="flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 12px;color:#fff;font-size:13px;" placeholder="Title">
          </div>
          <div style="background:linear-gradient(90deg,#ff006e,#8338ec,#3a86ff);color:#fff;padding:10px 20px;border-radius:8px;text-align:center;font-size:14px;font-weight:bold;cursor:pointer;">Einreichen</div>
        </div>
      </div>
    </div>
  </div>
</div>
