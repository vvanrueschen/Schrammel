services:
  schrammel:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./prisma:/app/prisma
    environment:
      - DATABASE_URL=file:./prisma/dev.db
      - NODE_ENV=production
      - CLEANUP_SECRET_TOKEN=${CLEANUP_SECRET_TOKEN}
    restart: unless-stopped

  cron:
    image: alpine:latest
    volumes:
      - ./cron/schrammel-crontab:/etc/crontabs/root
      - ./cron/cleanup.sh:/cleanup.sh:ro
    environment:
      - CLEANUP_SECRET_TOKEN=${CLEANUP_SECRET_TOKEN}
    command: sh -c "chmod +x /cleanup.sh && crond -f"
    restart: unless-stopped
